<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#071810"/>
      <stop offset="100%" stop-color="#0e2818"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ground" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="560" fill="url(#bg)"/>
  <rect width="400" height="560" fill="url(#glow)"/>
  <rect width="400" height="560" fill="url(#ground)"/>

  <g opacity="0.06" stroke="#4ade80" stroke-width="1">
    <line x1="0" y1="112" x2="400" y2="112"/>
    <line x1="0" y1="224" x2="400" y2="224"/>
    <line x1="0" y1="336" x2="400" y2="336"/>
    <line x1="0" y1="448" x2="400" y2="448"/>
    <line x1="80" y1="0" x2="80" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="560"/>
    <line x1="240" y1="0" x2="240" y2="560"/>
    <line x1="320" y1="0" x2="320" y2="560"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="200" cy="500" rx="90" ry="18" fill="#4ade80" opacity="0.15"/>
  <!-- Leaf particles on ground -->
  <ellipse cx="160" cy="498" rx="10" ry="4" fill="#4ade80" opacity="0.2" transform="rotate(-20,160,498)"/>
  <ellipse cx="240" cy="496" rx="8" ry="3" fill="#22c55e" opacity="0.2" transform="rotate(15,240,496)"/>

  <!-- Ranger outfit - leather vest -->
  <rect x="155" y="208" width="90" height="120" rx="12" fill="#6b4420"/>
  <!-- Leather detail -->
  <rect x="168" y="220" width="64" height="96" rx="8" fill="#7a5030"/>
  <!-- Belt -->
  <rect x="152" y="308" width="96" height="14" rx="7" fill="#4a2e10"/>
  <rect x="188" y="305" width="24" height="20" rx="4" fill="#d4af37" opacity="0.9"/>
  <!-- Quiver on back (right side) -->
  <rect x="248" y="170" width="26" height="90" rx="8" fill="#5a3010"/>
  <line x1="256" y1="172" x2="256" y2="258" stroke="#8b6040" stroke-width="2"/>
  <!-- Arrow tops sticking out -->
  <line x1="254" y1="168" x2="254" y2="148" stroke="#c8a060" stroke-width="3"/>
  <line x1="260" y1="165" x2="260" y2="145" stroke="#c8a060" stroke-width="3"/>
  <line x1="266" y1="168" x2="266" y2="148" stroke="#c8a060" stroke-width="3"/>
  <!-- Arrow tips -->
  <polygon points="254,148 251,154 257,154" fill="#a0c0a0"/>
  <polygon points="260,145 257,151 263,151" fill="#a0c0a0"/>
  <polygon points="266,148 263,154 269,154" fill="#a0c0a0"/>

  <!-- Arms -->
  <rect x="116" y="216" width="38" height="85" rx="14" fill="#6b4420"/>
  <rect x="246" y="216" width="38" height="85" rx="14" fill="#6b4420"/>
  <!-- Arm bracers -->
  <rect x="114" y="280" width="42" height="24" rx="8" fill="#4a2e10"/>
  <rect x="244" y="280" width="42" height="24" rx="8" fill="#4a2e10"/>

  <!-- Head -->
  <ellipse cx="200" cy="160" rx="52" ry="56" fill="#f5d0a0"/>
  <!-- Pointy elf ears -->
  <path d="M150 156 Q134 146 136 134 Q148 144 152 156Z" fill="#f5d0a0"/>
  <path d="M250 156 Q266 146 264 134 Q252 144 248 156Z" fill="#f5d0a0"/>
  <path d="M150 156 Q136 148 138 138" stroke="#d8b088" stroke-width="1" fill="none"/>
  <path d="M250 156 Q264 148 262 138" stroke="#d8b088" stroke-width="1" fill="none"/>
  <!-- Hair - blonde ponytail -->
  <path d="M152 152 Q152 110 200 102 Q248 110 248 152" fill="#e8c040"/>
  <!-- Ponytail -->
  <path d="M238 116 Q272 124 280 160 Q278 190 266 200 Q256 174 252 154Z" fill="#e8c040"/>
  <!-- Hair detail -->
  <path d="M154 150 L248 150 Q248 116 200 108 Q152 116 154 150Z" fill="#d4af30" opacity="0.5"/>
  <!-- Feather in hair -->
  <path d="M234 100 Q250 80 244 108 Q238 96 234 100Z" fill="#80d0ff" opacity="0.9"/>
  <path d="M242 96 Q256 80 252 110 Q246 98 242 96Z" fill="#a0e0ff" opacity="0.7"/>
  <!-- Eyes - bright green -->
  <ellipse cx="183" cy="160" rx="8" ry="9" fill="white"/>
  <ellipse cx="217" cy="160" rx="8" ry="9" fill="white"/>
  <ellipse cx="183" cy="161" rx="5" ry="6" fill="#20a860"/>
  <ellipse cx="217" cy="161" rx="5" ry="6" fill="#20a860"/>
  <circle cx="183" cy="159" r="2" fill="black"/>
  <circle cx="217" cy="159" r="2" fill="black"/>
  <circle cx="182" cy="157" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="216" cy="157" r="1.5" fill="white" opacity="0.9"/>
  <!-- Eyebrows -->
  <path d="M175 150 Q184 146 191 150" stroke="#c09820" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M209 150 Q216 146 225 150" stroke="#c09820" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M196 172 Q200 178 204 172" stroke="#c09070" stroke-width="1.5" fill="none"/>
  <!-- Smirk -->
  <path d="M190 187 Q202 196 212 186" stroke="#c07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="175" cy="175" rx="10" ry="6" fill="#ffb0a0" opacity="0.35"/>
  <ellipse cx="225" cy="175" rx="10" ry="6" fill="#ffb0a0" opacity="0.35"/>

  <!-- Bow (left hand) - large composite bow -->
  <g transform="translate(118,200)">
    <!-- Bow limbs -->
    <path d="M12 -80 Q-16 -40 -16 0 Q-16 40 12 80" stroke="#8b5e20" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M12 -80 Q24 -36 22 0 Q24 36 12 80" stroke="#a07030" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Bowstring -->
    <path d="M12 -80 Q-4 0 12 80" stroke="#e8e8d0" stroke-width="1.5" fill="none" opacity="0.9"/>
    <!-- Grip -->
    <rect x="4" y="-12" width="14" height="24" rx="6" fill="#5a3810"/>
    <!-- Arrow nocked -->
    <line x1="8" y1="-60" x2="8" y2="60" stroke="#c8a060" stroke-width="3"/>
    <polygon points="8,-60 5,-50 11,-50" fill="#a0c0a0"/>
  </g>

  <!-- Legs -->
  <rect x="163" y="348" width="40" height="100" rx="10" fill="#5a3a18"/>
  <rect x="197" y="348" width="40" height="100" rx="10" fill="#5a3a18"/>
  <!-- Knee pads -->
  <ellipse cx="183" cy="370" rx="16" ry="10" fill="#4a2e10"/>
  <ellipse cx="217" cy="370" rx="16" ry="10" fill="#4a2e10"/>
  <!-- Boots -->
  <rect x="158" y="430" width="48" height="38" rx="8" fill="#3a2210"/>
  <rect x="194" y="430" width="48" height="38" rx="8" fill="#3a2210"/>
  <!-- Boot cuffs -->
  <rect x="158" y="430" width="48" height="10" rx="5" fill="#4ade80" opacity="0.4"/>
  <rect x="194" y="430" width="48" height="10" rx="5" fill="#4ade80" opacity="0.4"/>

  <!-- Floating leaves -->
  <ellipse cx="310" cy="120" rx="10" ry="5" fill="#4ade80" opacity="0.5" transform="rotate(30,310,120)"/>
  <ellipse cx="298" cy="140" rx="7" ry="3" fill="#22c55e" opacity="0.4" transform="rotate(-20,298,140)"/>
  <ellipse cx="85" cy="250" rx="8" ry="4" fill="#4ade80" opacity="0.4" transform="rotate(15,85,250)"/>
  <ellipse cx="94" cy="275" rx="6" ry="3" fill="#22c55e" opacity="0.35" transform="rotate(-30,94,275)"/>
  <!-- Sparkles -->
  <text x="310" y="108" font-size="10" fill="#4ade80" opacity="0.6" text-anchor="middle">✦</text>
  <text x="88" y="242" font-size="8" fill="#4ade80" opacity="0.5" text-anchor="middle">✦</text>

  <!-- Bottom label -->
  <rect x="0" y="500" width="400" height="60" fill="#040e08" opacity="0.8"/>
  <text x="200" y="528" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="bold" letter-spacing="4" fill="#4ade80" opacity="0.5">REPLACE WITH</text>
  <text x="200" y="548" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="bold" letter-spacing="3" fill="#4ade80">SCOUT ARTWORK</text>
</svg>
